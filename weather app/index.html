<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Animated Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" id="city-input" placeholder="Enter city name" spellcheck="false">
            <button id="search-btn">Search</button>
        </div>
        <div class="weather">
            <img src="https://openweathermap.org/img/wn/02d@4x.png" id="weather-icon" alt="weather">
            <h1 id="temp">--°C</h1>
            <h2 id="city">Search City</h2>
            <p id="description">--</p>
            
            <div class="details">
                <div class="col">
                    <p id="humidity" class="info-val">--%</p>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <p id="wind" class="info-val">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
